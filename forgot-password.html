<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal Gateway | Forgot Password</title>
  <style>
    :root {
      --primary-blue: #002147;
      --gold-accent: #aa844c;
      --text-dark: #333333;
      --bg-light: #f8f9fa;
      --border-color: #e2e8f0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .auth-container {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
      box-sizing: border-box;
    }

    h2 { margin-top: 0; color: var(--primary-blue); font-size: 24px; }
    p.lead { font-size: 14px; color: #555; line-height: 1.5; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }

    .primary-action-btn {
      width: 100%;
      background: var(--gold-accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
    }
    .primary-action-btn:hover { background: #967340; }
    .primary-action-btn[disabled] { opacity: 0.6; cursor: not-allowed; }

    .hidden { display: none !important; }

    .form-error {
      display: none;
      background: #fdecea;
      color: #b3261e;
      border: 1px solid #f5c6c2;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 13px;
      margin: 0 0 16px;
    }
    .form-error.visible { display: block; }

    .form-success {
      display: none;
      background: #eaf6ec;
      color: #1e6b34;
      border: 1px solid #c2e5c8;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 13px;
      margin: 0 0 16px;
    }
    .form-success.visible { display: block; }

    .back-link { display: block; margin-top: 18px; font-size: 13px; text-align: center; }
  </style>
</head>
<body>

<div class="auth-container">
  <h2>Reset Your Password</h2>
  <p class="lead">Enter the email address on your account. If it matches a registered author profile, we'll send a link to reset your password.</p>

  <p class="form-error" id="form-error"></p>
  <p class="form-success" id="form-success">If that email is registered, a reset link has been sent. Check your inbox.</p>

  <form id="forgot-form">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required placeholder="author@institution.edu">
    </div>
    <button type="submit" class="primary-action-btn">Send Reset Link</button>
  </form>

  <a class="back-link" href="authentication.html">Back to Sign In</a>
</div>

<script>
  function showError(el, message) {
    el.textContent = message;
    el.classList.add('visible');
  }

  function clearError(el) {
    el.textContent = '';
    el.classList.remove('visible');
  }

  async function getCsrfToken() {
    const res = await fetch('/api/csrf-token');
    const data = await res.json();
    return data.csrf_token;
  }

  document.getElementById('forgot-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const form = event.target;
    const errorEl = document.getElementById('form-error');
    const successEl = document.getElementById('form-success');
    clearError(errorEl);
    successEl.classList.remove('visible');

    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    try {
      const csrfToken = await getCsrfToken();
      const res = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
        body: JSON.stringify({ email: form.email.value }),
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || 'Something went wrong. Please try again.');
      }
      successEl.classList.add('visible');
      form.reset();
    } catch (err) {
      showError(errorEl, err.message);
    } finally {
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
